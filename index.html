<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base 合约权限 Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <h1>合约权限 Dashboard</h1>
        <p class="hero-text">
          集中展示 Base 主网的 owner、oracle、auth 与 ProxyAdmin 升级权限，并结合链上实时状态，
          用于做权限迁移、治理盘点和结果复核。
        </p>
        <div class="hero-meta" id="heroMeta"></div>
      </div>
      <aside class="hero-panel">
        <p>页面会实时读取 Base 主网状态，用于展示当前权限持有情况和治理目标，不做交易执行。</p>
        <div class="hero-actions">
          <button id="refreshLiveBtn" class="primary-btn" type="button">刷新链上状态</button>
        </div>
        <div class="rpc-status" id="rpcStatus">RPC 尚未连接。</div>
      </aside>
    </header>

    <main>
      <section class="summary-grid" id="summaryGrid"></section>

      <section class="section-block">
        <div class="section-head">
          <div><h2>钱包分工</h2></div>
        </div>
        <div class="wallet-grid" id="walletGrid"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <div><h2>实时读取概览</h2></div>
        </div>
        <div class="summary-grid" id="liveSummaryGrid"></div>
      </section>

      <section class="section-block">
        <div class="section-head">
          <div><h2>权限总览</h2></div>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索合约、地址、函数、权限类型">
            <select id="typeFilter"><option value="all">全部权限类型</option></select>
            <select id="statusFilter">
              <option value="all">全部状态</option>
              <option value="pending_transfer">待迁移</option>
              <option value="pending_auth">待补齐</option>
              <option value="assigned">已分配</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>合约 / 权限</th>
                <th>链上当前权限</th>
                <th>建议接收方 / 备注</th>
                <th>关键函数</th>
              </tr>
            </thead>
            <tbody id="permissionsTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
